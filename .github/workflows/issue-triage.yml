name: Issue Triage & Auto-fix

on:
  issues:
    types: [opened, closed, reopened, labeled, assigned]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to process'
        required: true
        type: number

permissions:
  contents: write
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    if: |
      github.actor != 'github-actions[bot]' &&
      (github.event_name == 'workflow_dispatch' ||
       github.event.issue.user.login == 'pejosonic' || github.event.issue.user.login == 'luncheonticket' ||
       github.event.comment.user.login == 'pejosonic' || github.event.comment.user.login == 'luncheonticket')

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Python deps
        run: pip install anthropic

      - name: Resolve issue number
        id: meta
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_NUMBER: ${{ github.event.inputs.issue_number }}
          EVENT_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "number=${DISPATCH_NUMBER}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${EVENT_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch issue data for manual dispatch
        id: fetch
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          NUMBER: ${{ steps.meta.outputs.number }}
        run: |
          gh api "repos/${REPO}/issues/${NUMBER}" > /tmp/issue.json
          gh api "repos/${REPO}/issues/${NUMBER}/comments" > /tmp/comments.json

          TITLE=$(jq -r '.title' /tmp/issue.json)
          BODY=$(jq -r '.body // ""' /tmp/issue.json)
          COMMENTS=$(jq -r '.[] | "[\(.user.login)]: \(.body)"' /tmp/comments.json | head -30)

          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"
          printf '%s' "$BODY" > /tmp/issue_body.txt
          printf '%s' "$COMMENTS" > /tmp/issue_comments.txt

      - name: Run Claude autofix agent
        id: claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          ISSUE_NUMBER: ${{ steps.meta.outputs.number }}
          ISSUE_TITLE: ${{ github.event_name == 'workflow_dispatch' && steps.fetch.outputs.title || github.event.issue.title }}
          ISSUE_BODY: ${{ github.event_name != 'workflow_dispatch' && github.event.issue.body || '' }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          LABEL_NAME: ${{ github.event.label.name }}
          ASSIGNEE: ${{ github.event.assignee.login }}
        run: |
          # For manual dispatch, load body and comments from files written above
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            export ISSUE_BODY="$(cat /tmp/issue_body.txt)"
            export ISSUE_COMMENTS="$(cat /tmp/issue_comments.txt)"
          fi
          python3 .github/scripts/autofix.py > /tmp/result.json
          echo "attempted_fix=$(jq -r '.attempted_fix' /tmp/result.json)" >> "$GITHUB_OUTPUT"

      - name: Commit and push if fix is simple
        id: push
        if: steps.claude.outputs.attempted_fix == 'true'
        run: |
          FILES=$(git diff --name-only | wc -l)
          INSERTIONS=$(git diff --shortstat | grep -oP '\d+(?= insertion)' || echo 0)
          DELETIONS=$(git diff --shortstat | grep -oP '\d+(?= deletion)' || echo 0)
          LINES=$((INSERTIONS + DELETIONS))
          echo "Changed files: $FILES, lines: $LINES"
          if [ "$FILES" -le 3 ] && [ "$LINES" -le 50 ]; then
            git add -u
            git commit -m "Auto-fix: issue #${{ steps.meta.outputs.number }}

Applied by Claude based on issue report.
Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>"
            git push origin master
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          else
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            git checkout -- .
          fi

      - name: Post comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PUSHED: ${{ steps.push.outputs.pushed }}
          ATTEMPTED: ${{ steps.claude.outputs.attempted_fix }}
        run: |
          COMMENT=$(jq -r '.comment' /tmp/result.json)

          if [ "$PUSHED" = "true" ]; then
            STAT=$(git show --stat HEAD 2>/dev/null || echo "")
            FOOTER="---
**Auto-fix committed to master.**
\`\`\`
${STAT}
\`\`\`"
          elif [ "$ATTEMPTED" = "true" ]; then
            DIFF=$(git diff -- '*.cpp' '*.h' 'CMakeLists.txt' | head -200)
            FOOTER="---
**Fix drafted but too large to auto-push** (>3 files or >50 lines). Proposed diff:
\`\`\`diff
${DIFF}
\`\`\`"
          else
            FOOTER=""
          fi

          if [ -n "$FOOTER" ]; then
            printf '%s\n\n%s' "$COMMENT" "$FOOTER" > /tmp/final_comment.txt
          else
            printf '%s' "$COMMENT" > /tmp/final_comment.txt
          fi

          gh issue comment "${{ steps.meta.outputs.number }}" \
            --repo "$REPO" \
            --body "$(cat /tmp/final_comment.txt)"
