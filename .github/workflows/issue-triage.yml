name: Issue Triage & Auto-fix

on:
  issues:
    types: [opened, closed, reopened, labeled, assigned]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Python deps
        run: pip install anthropic

      - name: Build prompt
        id: prompt
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_ACTION: ${{ github.event.action }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          LABEL_NAME: ${{ github.event.label.name }}
          ASSIGNEE: ${{ github.event.assignee.login }}
        run: |
          if [ "$EVENT_NAME" = "issue_comment" ]; then
            PROMPT="A new comment was added to issue #${ISSUE_NUMBER}.

Issue title: ${ISSUE_TITLE}
Issue body:
${ISSUE_BODY}

New comment by ${COMMENT_AUTHOR}:
${COMMENT_BODY}

If the comment describes a bug or provides new technical details that suggest a fix, attempt it.
If it is just a question, answer it. If off-topic, write a brief acknowledgement only."

          elif [ "$EVENT_ACTION" = "opened" ]; then
            PROMPT="A new issue was opened (#${ISSUE_NUMBER}).

Title: ${ISSUE_TITLE}

Body:
${ISSUE_BODY}

Analyse the issue. If it describes a clear, small bug you can fix by editing source files, fix it.
Otherwise explain the problem and suggest manual next steps."

          elif [ "$EVENT_ACTION" = "closed" ]; then
            PROMPT="Issue #${ISSUE_NUMBER} ('${ISSUE_TITLE}') was just closed. Write a brief 2-sentence closing summary. Do not attempt any code fix."

          elif [ "$EVENT_ACTION" = "reopened" ]; then
            PROMPT="Issue #${ISSUE_NUMBER} ('${ISSUE_TITLE}') was reopened. Acknowledge this and ask the reporter to provide any new details. Do not attempt a code fix."

          elif [ "$EVENT_ACTION" = "labeled" ]; then
            PROMPT="Issue #${ISSUE_NUMBER} ('${ISSUE_TITLE}') was labeled '${LABEL_NAME}'. Write one sentence acknowledging the label. Do not attempt a code fix."

          elif [ "$EVENT_ACTION" = "assigned" ]; then
            PROMPT="Issue #${ISSUE_NUMBER} ('${ISSUE_TITLE}') was assigned to ${ASSIGNEE}. Write one sentence acknowledging the assignment. Do not attempt a code fix."

          else
            PROMPT="Issue #${ISSUE_NUMBER} ('${ISSUE_TITLE}') had action '${EVENT_ACTION}'. Write a brief acknowledgement."
          fi

          # Write prompt to file to avoid shell quoting issues
          printf '%s' "$PROMPT" > /tmp/prompt.txt
          echo "number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Run Claude autofix agent
        id: claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          export PROMPT="$(cat /tmp/prompt.txt)"
          python3 .github/scripts/autofix.py > /tmp/result.json
          echo "attempted_fix=$(jq -r '.attempted_fix' /tmp/result.json)" >> "$GITHUB_OUTPUT"

      - name: Commit and push if fix is simple
        id: push
        if: steps.claude.outputs.attempted_fix == 'true'
        run: |
          FILES=$(git diff --name-only | wc -l)
          LINES=$(git diff --shortstat | grep -oP '\d+ insertion' | grep -oP '\d+' || echo 0)
          LINES=$((LINES + $(git diff --shortstat | grep -oP '\d+ deletion' | grep -oP '\d+' || echo 0)))

          echo "Changed files: $FILES, lines: $LINES"

          if [ "$FILES" -le 3 ] && [ "$LINES" -le 50 ]; then
            BRANCH="autofix/issue-${{ steps.prompt.outputs.number }}"
            git checkout -b "$BRANCH"
            git add -u
            git commit -m "Auto-fix: issue #${{ steps.prompt.outputs.number }}

Applied by Claude based on issue report.
Co-Authored-By: Claude Sonnet 4.6 <noreply@anthropic.com>"
            git push origin "$BRANCH"
            echo "pushed=true" >> "$GITHUB_OUTPUT"
            echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          else
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            git checkout -- .  # discard — too large for auto-push
          fi

      - name: Build final comment
        run: |
          BASE_COMMENT=$(jq -r '.comment' /tmp/result.json)

          if [ "${{ steps.push.outputs.pushed }}" = "true" ]; then
            BRANCH="${{ steps.push.outputs.branch }}"
            DIFF_SUMMARY=$(git diff origin/master..."$BRANCH" --stat 2>/dev/null || echo "")
            EXTRA="

---
**Auto-fix pushed** to branch \`${BRANCH}\`.
\`\`\`
${DIFF_SUMMARY}
\`\`\`
Please review and merge if correct."

          elif [ "${{ steps.claude.outputs.attempted_fix }}" = "true" ]; then
            DIFF=$(git diff -- '*.cpp' '*.h' '*.cmake' 'CMakeLists.txt' | head -200)
            EXTRA="

---
**A fix was drafted but is too large to auto-push** (>3 files or >50 lines). Proposed diff (truncated to 200 lines):
\`\`\`diff
${DIFF}
\`\`\`"
          else
            EXTRA=""
          fi

          printf '%s%s' "$BASE_COMMENT" "$EXTRA" > /tmp/final_comment.txt

      - name: Post comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          gh issue comment "${{ steps.prompt.outputs.number }}" \
            --repo "$REPO" \
            --body "$(cat /tmp/final_comment.txt)"
